name: Update BlueBird orbit data

on:
  schedule:
    - cron: '0 */2 * * *'    # every 2 h — CelesTrak GP data only updates about that often
  workflow_dispatch:          # allows manual trigger from GitHub UI

permissions:
  contents: write             # allow the action to commit the updated TLE file

jobs:
  fetch-orbits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Conditionally fetch SPACEMOBILE orbit data from CelesTrak
        run: |
          python - <<'EOF'
          import requests, sys, pathlib

          # OMM CSV — CCSDS-standard GP element format. Unlike the legacy TLE
          # 3-line format, its NORAD_CAT_ID is a plain integer field, so it
          # carries 6+ digit catalog numbers natively (no Alpha-5 kludge).
          DATA_FILE = pathlib.Path("tles/spacemobile.txt")

          # gp.php's NAME= is a single substring match, so each catalog name
          # needs its own request. Per-query fragment + Last-Modified state
          # files let a 304 on one query reuse its cached rows while another
          # query updates.
          QUERIES = ["SPACEMOBILE", "BLUEWALKER"]

          pathlib.Path("tles").mkdir(exist_ok=True)
          header_row = None
          all_rows = []
          any_updated = False

          for name in QUERIES:
              frag = pathlib.Path(f"tles/.fragment_{name.lower()}.csv")
              state = pathlib.Path(f"tles/.last_modified_{name.lower()}")

              # Send If-Modified-Since so CelesTrak returns 304 (no body) when
              # this query's data hasn't changed.
              headers = {}
              if state.exists() and frag.exists():
                  prev = state.read_text().strip()
                  if prev:
                      headers["If-Modified-Since"] = prev

              resp = requests.get(
                  "https://celestrak.org/NORAD/elements/gp.php",
                  params={"NAME": name, "FORMAT": "CSV"},
                  headers=headers,
                  timeout=30,
              )

              if resp.status_code == 304:
                  print(f"{name}: 304 Not Modified — reusing cached fragment.")
                  text = frag.read_text().strip()
              else:
                  resp.raise_for_status()  # any other non-200 is a real error
                  text = resp.text.strip()
                  if not text or "No GP data found" in text:
                      # A name can drop out of the catalog (decay); warn but
                      # don't fail the whole fetch.
                      print(f"WARNING: no satellites returned for {name}")
                      frag.write_text("")
                      state.write_text(resp.headers.get("Last-Modified", "") + "\n")
                      any_updated = True
                      continue
                  frag.write_text(text + "\n")
                  state.write_text(resp.headers.get("Last-Modified", "") + "\n")
                  any_updated = True
                  print(f"{name}: updated. Last-Modified: {resp.headers.get('Last-Modified', 'n/a')}")

              rows = [l for l in text.splitlines() if l.strip()]
              if rows:
                  if header_row is None:
                      header_row = rows[0]
                  all_rows.extend(rows[1:])

          if not any_updated and DATA_FILE.exists():
              print("All queries 304 — nothing to commit.")
              sys.exit(0)

          if header_row is None or not all_rows:
              print("ERROR: No satellites parsed from any query")
              sys.exit(1)

          DATA_FILE.write_text("\n".join([header_row] + all_rows) + "\n")
          print(f"Updated: {len(all_rows)} satellites total.")
          EOF

      - name: Commit updated orbit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tles/spacemobile.txt tles/.last_modified* tles/.fragment_*.csv
          git diff --staged --quiet || git commit -m "Update BlueBird orbit data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
