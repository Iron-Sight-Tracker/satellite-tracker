name: Update BlueBird orbit data

on:
  schedule:
    - cron: '*/30 * * * *'   # checks every 30 min; only downloads when CelesTrak has new data
  workflow_dispatch:          # allows manual trigger from GitHub UI

permissions:
  contents: write             # allow the action to commit the updated data file

jobs:
  fetch-orbits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Conditionally fetch SPACEMOBILE orbit data from CelesTrak
        run: |
          python - <<'EOF'
          import requests, sys, pathlib

          # OMM CSV — CCSDS-standard GP element format. Unlike the legacy TLE
          # 3-line format, its NORAD_CAT_ID is a plain integer field, so it
          # carries 6+ digit catalog numbers natively (no Alpha-5 kludge).
          DATA_FILE = pathlib.Path("tles/spacemobile.txt")
          STATE_FILE = pathlib.Path("tles/.last_modified")  # remembers CelesTrak's Last-Modified

          # Send If-Modified-Since so CelesTrak returns 304 (no body) when nothing changed.
          headers = {}
          if STATE_FILE.exists() and DATA_FILE.exists():
              prev = STATE_FILE.read_text().strip()
              if prev:
                  headers["If-Modified-Since"] = prev

          resp = requests.get(
              "https://celestrak.org/NORAD/elements/gp.php",
              params={"NAME": "SPACEMOBILE", "FORMAT": "CSV"},
              headers=headers,
              timeout=30,
          )

          # 304 = our cache is still current. Nothing to download or commit.
          if resp.status_code == 304:
              print("304 Not Modified — CelesTrak has no new data. Skipping.")
              sys.exit(0)

          resp.raise_for_status()  # any other non-200 is a real error

          text = resp.text.strip()
          if not text or "No GP data found" in text:
              print("ERROR: No SPACEMOBILE satellites returned by CelesTrak")
              sys.exit(1)

          # CSV = one header row + one row per satellite.
          rows = [l for l in text.splitlines() if l.strip()]
          sat_count = max(0, len(rows) - 1)
          if sat_count == 0:
              print("ERROR: No satellites parsed")
              sys.exit(1)

          pathlib.Path("tles").mkdir(exist_ok=True)
          DATA_FILE.write_text(text + "\n")

          # Save CelesTrak's Last-Modified so the next run can ask "anything newer?"
          last_mod = resp.headers.get("Last-Modified", "")
          STATE_FILE.write_text(last_mod + "\n")

          print(f"Updated: {sat_count} satellites. CelesTrak Last-Modified: {last_mod or 'n/a'}")
          EOF

      - name: Commit updated orbit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tles/spacemobile.txt tles/.last_modified
          git diff --staged --quiet || git commit -m "Update BlueBird orbit data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
