name: Update launch dates

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch SATCAT for SpaceMobile satellites
        run: |
          mkdir -p launch
          # SATCAT NAME= is a single substring match, so BLUEWALKER-3 needs
          # its own request; merge both result sets under one header row.
          curl -fsSL \
            "https://celestrak.org/satcat/records.php?NAME=SPACEMOBILE&FORMAT=CSV" \
            -o /tmp/satcat_sm.csv
          curl -fsSL \
            "https://celestrak.org/satcat/records.php?NAME=BLUEWALKER&FORMAT=CSV" \
            -o /tmp/satcat_bw.csv
          head -1 /tmp/satcat_sm.csv > /tmp/satcat.csv
          tail -n +2 /tmp/satcat_sm.csv >> /tmp/satcat.csv
          tail -n +2 /tmp/satcat_bw.csv >> /tmp/satcat.csv
          python3 .github/scripts/build_launch_dates.py \
            /tmp/satcat.csv launch/launch_dates.txt

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add launch/launch_dates.txt
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update launch dates from SATCAT"
            git push
          fi
